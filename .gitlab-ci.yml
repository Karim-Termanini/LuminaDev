# GitLab CI/CD Configuration for LuminaDev (Tauri + Rust + JS)

image: rust:latest

variables:
  PNPM_HOME: ".pnpm-store"
  CARGO_HOME: ".cargo"

# التخزين المؤقت لتسريع العمليات في المرات القادمة
cache:
  paths:
    - .pnpm-store
    - .cargo/bin/
    - .cargo/registry/index/
    - .cargo/registry/cache/
    - .cargo/git/db/
    - apps/desktop/src-tauri/target/

stages:
  - setup
  - test
  - build

# الخطوة الأولى: تثبيت المتطلبات الأساسية للنظام (Tauri Dependencies)
before_script:
  - apt-get update -y && apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf curl build-essential wget docker.io
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs
  - corepack enable
  - corepack prepare pnpm@latest --activate

# مهمة التحقق من الكود والاختبارات
smoke-tests:
  stage: test
  script:
    - pnpm install
    - pnpm smoke
    - cd apps/desktop/src-tauri && cargo test -- --nocapture
  artifacts:
    paths:
      - apps/desktop/out/
    expire_in: 1 week

# مهمة البناء (تجربة بناء نسخة Linux)
build-app:
  stage: build
  script:
    - pnpm install
    - pnpm build:web
    - cd apps/desktop && npx tauri build
  only:
    - main
    - tags

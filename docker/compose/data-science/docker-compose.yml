# LUMINA_DEV_COMPOSE_FULL=1 overlay — data science stack

services:
  jupyter:
    image: jupyter/datascience-notebook:${PYTHON_IMAGE_TAG:-latest}
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    environment:
      - JUPYTER_TOKEN=luminadev
    volumes:
      - ${PROJECT_DIR}:/home/jovyan/work
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    ports:
      - "${POSTGRES_PORT:-54320}:5432"
    environment:
      - POSTGRES_PASSWORD=luminadev
      - POSTGRES_DB=datasci
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  notebooks:
  pg_data:

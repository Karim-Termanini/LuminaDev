# LUMINA_DEV_COMPOSE_FULL=1 overlay — data science stack
name: lumina-data-science

services:
  jupyter:
    image: jupyter/datascience-notebook:${PYTHON_IMAGE_TAG:-latest}
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=luminadev
    volumes:
      - ${PROJECT_DIR:-~/LuminaProjects/data-science/default}:/home/jovyan/work
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    ports:
      - "54320:5432"
    environment:
      - POSTGRES_PASSWORD=luminadev
      - POSTGRES_DB=datasci
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  notebooks:
  pg_data:

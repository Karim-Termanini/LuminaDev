# Mobile dev stack
# All ports use env vars with non-overlapping defaults to prevent collisions across profiles.

services:
  appium:
    image: appium/appium:latest
    ports:
      - '${APPIUM_PORT:-30500}:4723'
    restart: unless-stopped

  json-server:
    image: vimagick/json-server:latest
    ports:
      - '${JSON_SERVER_PORT:-30501}:3000'
    restart: unless-stopped

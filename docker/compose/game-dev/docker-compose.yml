# Game dev stack
# All ports use env vars with non-overlapping defaults to prevent collisions across profiles.

services:
  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-30400}:6379'
    restart: unless-stopped

  game-server:
    image: alpine:latest
    command: ['sleep', 'infinity']
    ports:
      - '${GAME_SERVER_PORT:-30401}:7777'
    restart: unless-stopped

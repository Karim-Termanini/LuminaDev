# Optional “realistic” overlay merged with docker-compose.yml when the app process has
# LUMINA_DEV_COMPOSE_FULL=1 (or true/yes). Default remains stub-only for CI and low-resource hosts.
name: lumina-web-dev

services:
  node:
    image: node:${NODE_IMAGE_TAG:-20-alpine}
    working_dir: /app
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ${PROJECT_DIR:-~/LuminaProjects/web-dev/default}:/app
    command: tail -f /dev/null
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    ports:
      - "54321:5432"
    environment:
      - POSTGRES_PASSWORD=luminadev
      - POSTGRES_USER=postgres
      - POSTGRES_DB=webapp
    restart: unless-stopped

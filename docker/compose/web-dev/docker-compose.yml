# Optional “realistic” overlay merged with docker-compose.yml when the app process has
# LUMINA_DEV_COMPOSE_FULL=1 (or true/yes). Default remains stub-only for CI and low-resource hosts.

services:
  node:
    image: node:${NODE_IMAGE_TAG:-20-alpine}
    working_dir: /app
    ports:
      - "${NODE_PORT:-30000}:3000"
      - "${NODE_HMR_PORT:-30001}:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ${PROJECT_DIR}:/app
    command: tail -f /dev/null
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    ports:
      - "${POSTGRES_PORT:-30002}:5432"
    environment:
      - POSTGRES_PASSWORD=luminadev
      - POSTGRES_USER=postgres
      - POSTGRES_DB=webapp
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_data:

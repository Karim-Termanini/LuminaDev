services:
  pytorch:
    image: pytorch/pytorch:latest
    container_name: lumina-ai-pytorch
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/workspace/notebooks
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

# AI/ML dev stack
# All ports use env vars with non-overlapping defaults to prevent collisions across profiles.
# Override via LUMINA_DEV_COMPOSE_ROOT env or store.json port assignments.

services:
  jupyter:
    image: jupyter/scipy-notebook:latest
    ports:
      - '${JUPYTER_PORT:-30100}:8888'
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=luminadev
    volumes:
      - jupyter_data:/home/jovyan/work
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - '${OLLAMA_PORT:-30101}:11434'
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  jupyter_data:
  ollama_data:

# Infra / k8s dev stack
# All ports use env vars with non-overlapping defaults to prevent collisions across profiles.

services:
  traefik:
    image: traefik:v3.0
    ports:
      - '${TRAEFIK_HTTP_PORT:-30300}:80'
      - '${TRAEFIK_HTTPS_PORT:-30301}:443'
      - '${TRAEFIK_API_PORT:-30302}:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --api.insecure=true
      - --providers.docker=true
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - '${PORTAINER_PORT:-30303}:9000'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - '${PROMETHEUS_PORT:-30304}:9090'
    restart: unless-stopped

volumes:
  portainer_data:

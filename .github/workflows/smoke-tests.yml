name: Smoke Tests

on:
  push:
    branches: [main, 'phase-*', 'stabilization/*', 'feat/*', 'fix/*', 'chore/*']
  pull_request:
    branches: [main]

jobs:
  rust-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - name: Install Linux build deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libglib2.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2
      - run: pnpm install --frozen-lockfile
      - name: Rust Docker smoke tests
        working-directory: apps/desktop/src-tauri
        run: cargo test --test docker_smoke -- --nocapture
      - name: Rust Job Runner tests
        working-directory: apps/desktop/src-tauri
        run: cargo test job_runner -- --nocapture

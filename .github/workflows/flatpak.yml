name: Flatpak Build

on:
  push:
    branches: [main, 'phase-*', 'stabilization/*', 'feat/*', 'fix/*', 'chore/*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Install Flatpak runtimes
        run: |
          flatpak install -y flathub org.gnome.Platform//49 org.gnome.Sdk//49
          flatpak install -y flathub org.freedesktop.Sdk.Extension.rust-stable org.freedesktop.Sdk.Extension.node20
      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/io.github.karimodora.LinuxDevHome.tauri.yml
          bundle: luminadev.flatpak
          cache-key: flatpak-${{ github.sha }}
          upload-artifact: true
      - name: Basic Flatpak runtime smoke
        run: |
          flatpak install -y --user --noninteractive --reinstall luminadev.flatpak
          flatpak run --command=sh io.github.karimodora.LinuxDevHome -c 'echo flatpak-run-ok'

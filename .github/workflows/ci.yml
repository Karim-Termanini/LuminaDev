name: Quality Gate

on:
  push:
    branches: [main, 'phase-*', 'stabilization/*', 'feat/*', 'fix/*', 'chore/*']
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Normalize GitHub git protocol to HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: pnpm install --frozen-lockfile
      - name: Lint + typecheck + unit tests
        run: bash scripts/smoke-ci.sh

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Normalize GitHub git protocol to HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: pnpm install --frozen-lockfile
      - name: Production dependency audit
        run: pnpm audit --prod --audit-level=high

  integration-and-e2e-lite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Normalize GitHub git protocol to HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: pnpm install --frozen-lockfile
      - name: Integration tests
        run: pnpm test:integration
      - name: E2E-lite critical scenarios
        run: pnpm test:e2e
      - name: Coverage baseline (critical files)
        run: pnpm test:coverage

  native-linux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - name: Install Linux build deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Normalize GitHub git protocol to HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: pnpm install --frozen-lockfile
      - name: Build frontend bundle
        run: pnpm --filter desktop build:web
      - name: Build Tauri Linux app
        run: pnpm --filter desktop build:tauri


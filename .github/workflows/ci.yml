name: Quality Gate

on:
  push:
    branches: [main, 'phase-*']
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install deps for native addons
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 pkg-config libsecret-1-dev
      - name: Normalize GitHub git protocol to HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: pnpm install --frozen-lockfile
      - name: Rebuild native modules for Electron
        run: pnpm --filter desktop rebuild:native
      - name: Lint + typecheck + unit tests
        run: bash scripts/smoke-ci.sh

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Normalize GitHub git protocol to HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: pnpm install --frozen-lockfile
      - name: Production dependency audit
        run: pnpm audit --prod --audit-level=high

  integration-and-e2e-lite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Normalize GitHub git protocol to HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: pnpm install --frozen-lockfile
      - name: Integration tests
        run: pnpm test:integration
      - name: E2E-lite critical scenarios
        run: pnpm test:e2e
      - name: Coverage baseline (critical files)
        run: pnpm test:coverage

  native-linux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install deps for native addons
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 pkg-config libsecret-1-dev
      - name: Normalize GitHub git protocol to HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
      - run: pnpm install --frozen-lockfile
      - name: Rebuild native modules for Electron
        run: pnpm --filter desktop rebuild:native
      - name: Build Linux app
        run: pnpm build

  flatpak-offline-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Flatpak build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      - name: Flatpak offline build smoke
        run: |
          flatpak-builder --force-clean flatpak-build-dir flatpak/io.github.karimodora.LinuxDevHome.offline.yml
